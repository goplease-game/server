<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>goplease Test Client</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        #log { background: #000; border: 1px solid #333; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 4px; border-bottom: 1px solid #222; }
        .type-in { color: #8888ff; }
        .type-out { color: #ffff88; }
        .controls { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        button { cursor: pointer; padding: 8px; background: #333; color: #fff; border: 1px solid #555; }
        button:hover { background: #444; }
    </style>
</head>
<body>

<h2>goplease WS test</h2>
<div id="log"></div>

<div class="controls">
    <button onclick="connect()">Connect</button>
    <button onclick="send('new_game')">Find Match</button>
    <button onclick="send('get_state')">Get State</button>
    <button onclick="send('end_turn')">End Turn</button>
    <button onclick="send('cancel_match')">Cancel</button>
</div>

<script>
    let ws;
    const logElement = document.getElementById('log');

    const playerId = "test-player-" + Math.floor(Math.random() * 1000);

    function addLog(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = `msg type-${type}`;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${type.toUpperCase()}: ${JSON.stringify(msg)}`;
        logElement.appendChild(div);
        logElement.scrollTop = logElement.scrollHeight;
    }

    function connect() {
        ws = new WebSocket(`ws://localhost:8080/goplease/?player_id=${playerId}`);

        ws.onopen = () => addLog("Connected to server", "info");

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addLog(data, "in");
        };

        ws.onclose = () => addLog("Disconnected", "info");
        ws.onerror = (err) => addLog(err, "error");
    }

    function send(type, data = {}) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            addLog("Not connected!", "error");
            return;
        }
        const payload = { type, data };
        ws.send(JSON.stringify(payload));
        addLog(payload, "out");
    }
</script>
</body>
</html>
